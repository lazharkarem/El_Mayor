<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Mayor Kebab - Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</head>
<body>

    <div class="toolbar no-print">
        <div class="toolbar-brand">EL MAYOR MENU GENERATOR</div>
        <div class="toolbar-controls">
            <label for="format-select">Format:</label>
            <select id="format-select">
                <option value="a3">A3 Menu</option>
                <option value="desk15x30">Desk Menu (150×300mm)</option>
                <option value="wall70x80">Wall Menu (700×800mm)</option>
                <option value="kappa45x280">Kappa Menu (450×2800mm)</option>
            </select>
            <button onclick="window.print()">🖨 Print / Save PDF</button>
        </div>
    </div>

    <!-- ══════════════════════ PAGE 1 (FRONT COVER) ══════════════════════ -->
    <div class="menu-wrapper page-wrapper" id="menu-page-1" data-format="a3">

        <!-- Corner decorative food images — z-index: 0, behind all content -->
        <div class="corner-img corner-bl"
             style="background-image:url('assets/tacos.png')"></div>

        <main class="menu-grid menu-grid-p1">
            <!-- Col 1: food image at top + simple items -->
            <div class="menu-col col-dark" id="col-1-p1"></div>

            <!-- Col 2: simple items -->
            <div class="menu-col col-dark" id="col-2-p1"></div>

            <!-- Col 3: boxed items + thumbnail gallery + image items -->
            <div class="menu-col col-featured" id="col-3-p1"></div>

            <!-- Col 4: RED brand column -->
            <div class="menu-col col-red" id="col-4-p1">
                <div class="col-red-top">
                    <!-- Floating decorations -->
                    <div class="deco-leaf">🌿</div>
                    <div class="deco-chili">🌶️</div>
                    <div class="deco-tomato">🍅</div>

                    <div class="logo-container">
                        <img src="assets/PHOTO-2026-05-30-15-30-38.jpg" alt="El Mayor Logo">
                    </div>
                    <div class="resto-name">
                        <p>═══ EL MAYOR ═══</p>
                        <span>IL MIGLIOR RISTORANTE<br>IN CITTÀ DAL 2024</span>
                    </div>
                </div>

                <!-- Large circular plate image (overlaps top and bottom) -->
                <div class="plate-circle"
                     style="background-image:url('assets/piatti_kebab.png')"></div>

                <div class="col-red-bottom">
                    <div class="brand-text">
                        <p class="brand-sub">EL MAYOR</p>
                        <h2 class="brand-title">KEBAB<br>MENU</h2>
                    </div>
                    <div class="hours-container">
                        <p>APERTO TUTTI I GIORNI:</p>
                        <h3>11:00 – 24:00</h3>
                    </div>
                    <div class="contact-info">
                        <p>📍 Via Roma 1, Milano</p>
                        <p>📞 +39 02 1234 5678</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ══════════════════════ PAGE 2 (INSIDE / BACK) ══════════════════════ -->
    <div class="menu-wrapper page-wrapper" id="menu-page-2" data-format="a3">

        <div class="wood-bg-overlay"></div>

        <!-- Large grill circle — top center, z-index: 0 (behind content) -->
        <div class="grill-circle"
             style="background-image:url('assets/piatti_mix.png')"></div>

        <!-- Corner bleed images -->
        <div class="corner-img corner-bl"
             style="background-image:url('assets/piatti_mergez.png')"></div>
        <div class="corner-img corner-br"
             style="background-image:url('assets/choco.png')"></div>

        <main class="menu-grid menu-grid-p2">
            <div class="menu-col col-dark" id="col-1-p2"></div>
            <div class="menu-col col-dark" id="col-2-p2"></div>
            <div class="menu-col col-dark" id="col-3-p2"></div>
            <div class="menu-col col-dark" id="col-4-p2"></div>
        </main>
    </div>

    <!-- ══════════════════════ WALL MENU (KAPPA 45x280) ══════════════════════ -->
    <div id="wall-menu-wrapper" class="wall-theme" style="display:none;" data-format="kappa45x280">
        <!-- Floating background blobs will be handled by CSS -->
        <main class="wall-grid" id="wall-grid-container"></main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
